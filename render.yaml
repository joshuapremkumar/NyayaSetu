services:
  # Backend API Service
  - type: web
    name: courtaction-ai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run db:generate && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: courtaction-ai-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: courtaction-ai-frontend
          property: host
      - key: UPLOAD_DIR
        value: /opt/render/project/src/backend/uploads
      - key: MAX_FILE_SIZE
        value: 52428800
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Service
  - type: web
    name: courtaction-ai-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: courtaction-ai-backend
          property: host
    autoDeploy: true

databases:
  - name: courtaction-ai-db
    databaseName: courtaction_ai
    user: courtaction_ai_user
    region: oregon
    plan: free
    postgresMajorVersion: 15

